<head>
<meta charset="UTF-8">

<title>後台操作手冊 · 默聲創意</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #FFFDF5;
    --surface: #FFFFFF;
    --border: #EDE8D8;
    --text-primary: #151C31;
    --text-secondary: #5A5F72;
    --text-muted: #A8ADBF;
    --accent: #151C31;
    --accent-light: #FFFBEA;
    --accent-mid: #F8CB2A;
    --tag-bg: #FEF9EC;
    --tag-text: #151C31;
    --green: #B08800;
    --green-light: #FFFBEA;
    --yellow: #F8CB2A;
    --shadow-sm: 0 1px 4px rgba(21,28,49,.05);
    --shadow-md: 0 4px 20px rgba(21,28,49,.08);
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-logo {
    width: 36px; height: 36px;
    background: var(--yellow);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .header-logo svg { width: 20px; height: 20px; }
  .header-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .header-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

  /* ── Main ── */
  .main {
    max-width: 760px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  /* ── Search area ── */
  .search-section { margin-bottom: 28px; }
  .search-label {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 6px;
  }
  .search-hint {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 14px;
  }
  .search-box {
    position: relative;
    display: flex;
    align-items: center;
  }
  .search-icon {
    position: absolute;
    left: 16px;
    color: var(--text-muted);
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    padding: 14px 48px 14px 48px;
    font-size: 15px;
    font-family: inherit;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text-primary);
    outline: none;
    box-shadow: var(--shadow-sm);
    transition: border-color .15s, box-shadow .15s;
  }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(248,203,42,.25);
  }
  .search-input::placeholder { color: var(--text-muted); }
  .clear-btn {
    position: absolute;
    right: 14px;
    background: none; border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    border-radius: 50%;
    display: none;
    align-items: center; justify-content: center;
    transition: background .15s, color .15s;
  }
  .clear-btn:hover { background: var(--tag-bg); color: var(--text-primary); }
  .clear-btn.visible { display: flex; }

  /* ── Category tabs ── */
  .tabs-wrap {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .tab {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-size: 13px;
    font-family: inherit;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all .15s;
    font-weight: 500;
  }
  .tab:hover { border-color: var(--accent-mid); color: var(--accent); background: var(--tag-bg); }
  .tab.active { border-color: var(--accent); background: var(--accent); color: #F8CB2A; }

  /* ── Result count ── */
  .result-meta {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 12px;
    min-height: 20px;
  }
  .result-meta span { color: var(--accent); font-weight: 600; }

  /* ── QA Card ── */
  .qa-list { display: flex; flex-direction: column; gap: 10px; }

  .qa-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    transition: border-color .15s, box-shadow .15s;
  }
  .qa-card:hover { border-color: var(--accent-mid); box-shadow: 0 4px 16px rgba(248,203,42,.15); }
  .qa-card.open { border-color: var(--yellow); }

  .qa-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 16px 18px;
    cursor: pointer;
    user-select: none;
  }
  .qa-badge {
    flex-shrink: 0;
    margin-top: 1px;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .02em;
    white-space: nowrap;
  }
  .qa-question {
    flex: 1;
    font-size: 14.5px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.5;
  }
  .qa-chevron {
    flex-shrink: 0;
    margin-top: 2px;
    color: var(--text-muted);
    transition: transform .2s;
  }
  .qa-card.open .qa-chevron { transform: rotate(180deg); }

  .qa-body {
    display: none;
    padding: 0 18px 18px 18px;
    border-top: 1px solid var(--border);
  }
  .qa-card.open .qa-body { display: block; }
  .qa-answer-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin: 14px 0 6px;
  }
  .qa-answer {
    font-size: 14px;
    color: var(--text-primary);
    line-height: 1.7;
    background: var(--green-light);
    border-left: 3px solid var(--yellow);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 10px 14px;
  }

  /* highlight match */
  mark {
    background: #F8CB2A;
    color: inherit;
    border-radius: 2px;
    padding: 0 1px;
  }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    display: none;
  }
  .empty.show { display: block; }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-size: 16px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
  .empty-sub { font-size: 13px; }

  /* ── Category badge colors ── */
  .badge-後台操作 { background: #FEF0C7; color: #92700A; }
  .badge-網站異常 { background: #FDE8E8; color: #B83232; }
  .badge-需求評估 { background: #E8F4FD; color: #2A6190; }
  .badge-SEO      { background: #E6F6EF; color: #1E7A4E; }
  .badge-主機續約 { background: #F0EEF9; color: #5A47A0; }
  .badge-代碼串接 { background: #FDE8F5; color: #A02878; }
  .badge-特殊功能 { background: #EEF0F5; color: #3E4460; }

  @media (max-width: 480px) {
    .main { padding: 20px 14px 60px; }
    .search-label { font-size: 18px; }
    .search-input { font-size: 14px; padding: 12px 44px; }
  }
</style>

const CATEGORIES = ["全部", ...new Set(QA_DATA.map(q => q.cat))];

let currentCat = "全部";
let currentQuery = "";

// ── Build tabs ──
const tabsWrap = document.getElementById("tabs");
CATEGORIES.forEach(cat => {
  const btn = document.createElement("button");
  btn.className = "tab" + (cat === "全部" ? " active" : "");
  btn.textContent = cat;
  btn.dataset.cat = cat;
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    btn.classList.add("active");
    currentCat = cat;
    render();
  });
  tabsWrap.appendChild(btn);
});

// ── Search ──
const searchInput = document.getElementById("searchInput");
const clearBtn = document.getElementById("clearBtn");

searchInput.addEventListener("input", () => {
  currentQuery = searchInput.value.trim();
  clearBtn.classList.toggle("visible", currentQuery.length > 0);
  render();
});

clearBtn.addEventListener("click", () => {
  searchInput.value = "";
  currentQuery = "";
  clearBtn.classList.remove("visible");
  searchInput.focus();
  render();
});

// ── Filter & score ──
function score(item, q) {
  if (!q) return 1;
  const terms = q.toLowerCase().split(/\s+/).filter(Boolean);
  let s = 0;
  terms.forEach(t => {
    if (item.q.includes(t)) s += 3;
    if (item.a.includes(t)) s += 2;
    if (item.kw.some(k => k.toLowerCase().includes(t))) s += 2;
    if (item.cat.includes(t)) s += 1;
  });
  return s;
}

function highlight(text, q) {
  if (!q) return text;
  const terms = q.split(/\s+/).filter(Boolean);
  let result = text;
  terms.forEach(t => {
    const re = new RegExp(`(${t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    result = result.replace(re, '<mark>$1</mark>');
  });
  return result;
}

// ── Render ──
function render() {
  const list = document.getElementById("qaList");
  const meta = document.getElementById("resultMeta");
  const empty = document.getElementById("emptyState");

  let filtered = QA_DATA;
  if (currentCat !== "全部") {
    filtered = filtered.filter(item => item.cat === currentCat);
  }

  if (currentQuery) {
    filtered = filtered
      .map(item => ({ item, s: score(item, currentQuery) }))
      .filter(({ s }) => s > 0)
      .sort((a, b) => b.s - a.s)
      .map(({ item }) => item);
  }

  list.innerHTML = "";
  empty.classList.remove("show");

  if (filtered.length === 0) {
    empty.classList.add("show");
    meta.innerHTML = "";
    return;
  }

  if (currentQuery || currentCat !== "全部") {
    meta.innerHTML = `找到 <span>${filtered.length}</span> 筆結果`;
  } else {
    meta.innerHTML = `共 <span>${filtered.length}</span> 筆常見問題`;
  }

  filtered.forEach(item => {
    const card = document.createElement("div");
    card.className = "qa-card";
    card.innerHTML = `
      <div class="qa-header">
        <span class="qa-badge badge-${item.cat}">${item.cat}</span>
        <span class="qa-question">${highlight(item.q, currentQuery)}</span>
        <span class="qa-chevron">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </span>
      </div>
      <div class="qa-body">
        <div class="qa-answer-label">解決方式</div>
        <div class="qa-answer">${highlight(item.a, currentQuery)}</div>
      </div>
    `;
    card.querySelector(".qa-header").addEventListener("click", () => {
      card.classList.toggle("open");
    });

    // Auto-open if searching
    if (currentQuery) card.classList.add("open");

    list.appendChild(card);
  });
}

render();
</script>
